name        = "find.fs"
version     = "0.1.0"
description = "Search for files by name pattern or by content match within a directory tree"

triggers = ["find a file", "find the file", "search my files", "search for file", "locate file", "which file contains", "grep"]

[display]
action = "Searching for \"{query}\" in {path}"

[capabilities]
fs = true

[call]
args_schema   = '{"path":"string","query":"string","mode":"name|content","max_results":20}'
output_schema = '{"matches":[{"path":"string","preview":"string"}],"truncated":"bool"}'

[react]
max_steps = 1
