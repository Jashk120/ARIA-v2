name        = "find.fs"
version     = "0.1.0"
description = "Search for files by name pattern or by content match within a directory tree"

triggers = [
    "find file", "find files", "find the file", "find a file",
    "search my files", "search for file", "search files",
    "locate file", "locate files",
    "which file contains", "grep",
    "where is", "look for file",
    "find on my local", "files on my local",
    "look up file", "search directory",
]

[display]
action = "Searching for \"{query}\" in {path}"

[capabilities]
fs = true

[call]
args_schema   = '{"path":"string","query":"string","mode":"name|content","max_results":20}'
output_schema = '{"matches":[{"path":"string","preview":"string"}],"truncated":"bool"}'

[react]
max_steps = 3

[config.fs_root]
default = "~/aria-workspace"
inject  = true
secret  = false

[config.fs_mode]
default = "blacklist"
inject  = true
secret  = false

[config.fs_allow]
default = ""
inject  = true
secret  = false

[config.fs_deny]
default = ".git;node_modules;target;__pycache__"
inject  = true
secret  = false
