name        = "list.fs"
version     = "0.1.0"
description = "List files and directories inside a given directory"

triggers = ["fs"]

[display]
action = "Listing {path}"

[capabilities]
fs = true

[call]
args_schema   = '{"path":"string"}'
output_schema = '{"path":"string","entries":[{"name":"string","is_dir":"bool","size":"number"}]}'

[react]
max_steps = 3

[config.fs_root]
default = "~/aria-workspace"
inject  = true

[config.fs_mode]
default = "whitelist"
inject  = true

[config.fs_allow]
default = "*"
inject  = true

[config.fs_deny]
default = ""
inject  = true
