name        = "list.fs"
version     = "0.1.0"
description = "List files and directories inside a given directory"

triggers = ["list files", "what's in this folder", "what's in this directory", "show me the files in", "ls "]

[display]
action = "Listing {path}"

[capabilities]
fs = true

[call]
args_schema   = '{"path":"string"}'
output_schema = '{"path":"string","entries":[{"name":"string","is_dir":"bool","size":"number"}]}'

[react]
max_steps = 3
