name        = "read.fs"
version     = "0.1.0"
description = "Read the contents of a text file from the local filesystem"

triggers = ["fs"]

[display]
action = "Reading {path}"

[capabilities]
fs = true

[call]
args_schema   = '{"path":"string","max_chars":4000}'
output_schema = '{"path":"string","text":"string","chars":"number","truncated":"bool"}'

[react]
max_steps = 3

[config.fs_root]
default = "~/aria-workspace"
inject  = true

[config.fs_mode]
default = "whitelist"
inject  = true

[config.fs_allow]
default = "*"
inject  = true

[config.fs_deny]
default = ""
inject  = true
