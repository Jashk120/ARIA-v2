name        = "write.fs"
version     = "0.1.0"
description = "Write or overwrite a text file on the local filesystem"

triggers = ["fs"]

[display]
action = "Writing {path}"

[capabilities]
fs = true

[call]
args_schema   = '{"path":"string","content":"string","mode":"overwrite|append"}'
output_schema = '{"path":"string","bytes_written":"number"}'

[react]
max_steps = 1

[config.fs_root]
default = "~/aria-workspace"
inject  = true

[config.fs_mode]
default = "whitelist"
inject  = true

[config.fs_allow]
default = "*"
inject  = true

[config.fs_deny]
default = ""
inject  = true
