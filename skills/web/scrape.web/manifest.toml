name        = "scrape.web"
version     = "0.1.0"
description = "Fetch and extract text content from a URL"
triggers = ["read this url", "scrape", "fetch this page", "open this link", "summarize this page", "what's on this page", "http://", "https://"]

[display]
action = "Reading {url}"

[capabilities]
http = true

[call]
args_schema   = '{"url":"string","max_chars":4000}'
output_schema = '{"url":"string","text":"string","chars":"number"}'

[react]
max_steps = 3