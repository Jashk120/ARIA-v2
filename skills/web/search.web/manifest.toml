name        = "search.web"
version     = "0.1.0"
description = "Web search via SearXNG or Brave"
triggers = ["search online", "look up", "google", "latest news", "search the web", "find info on"]

[display]
action = "Searching the web for \"{query}\""

[capabilities]
http = true

[call]
args_schema   = '{"query":"string","max_results":5}'
output_schema = '{"results":[{"title":"string","url":"string","snippet":"string"}],"source":"string"}'

[react]
max_steps = 3

[config.searxng_url]
default = "http://localhost:8080"
inject  = true
secret  = false

[config.brave_api_key]
default = ""
inject  = true
secret  = true